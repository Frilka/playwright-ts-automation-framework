name: 🎭 Playwright Tests (API + UI)

on:
  # Trigger manually from GitHub UI
  workflow_dispatch:

  # Run weekly on Sunday at 02:00 UTC
  schedule:
    - cron: '0 2 * * 0'

jobs:
  # ============================================================
  # 1️⃣  Run API tests first (single browser)
  # ============================================================
  api-tests:
    name: Run API Tests
    runs-on: ubuntu-latest

    env:
      FORM_AUTH_USER: ${{ secrets.FORM_AUTH_USER }}
      FORM_AUTH_PASS: ${{ secrets.FORM_AUTH_PASS }}
      BASE_URL: ${{ secrets.BASE_URL }}
      REPORT_NAME: api

    steps:
      - name: 🧾 Checkout repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🎭 Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: 🚀 Run API tests (single browser)
        run: npx playwright test src/tests/api --project=chromium

      - name: 📦 Package API reports
        run: |
            # mkdir -p combined/api
            mv playwright-report combined/api/playwright-report
            # mv json-report combined/api/json-report
            mv blob-report combined/api/blob-report
      - name: 📄 Upload API test report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
            name: report-api
            path: combined/api
            if-no-files-found: error

  # ============================================================
  # 2️⃣  Run UI tests after API succeeds (matrix of browsers)
  # ============================================================
