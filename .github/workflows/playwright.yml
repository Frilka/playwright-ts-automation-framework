#     runs-on: ubuntu-latest
#     needs: api-tests     # Wait until API job passes

#     strategy:
#       matrix:
#         browser: [chromium, firefox]
#       fail-fast: false

#     env:
#       FORM_AUTH_USER: ${{ secrets.FORM_AUTH_USER }}
#       FORM_AUTH_PASS: ${{ secrets.FORM_AUTH_PASS }}
#       BASE_URL: ${{ secrets.BASE_URL }}
#       REPORT_NAME: ${{ matrix.browser }}

#     steps:
#       - name: 🧾 Checkout repository
#         uses: actions/checkout@v4

#       - name: ⚙️ Setup Node.js
#         uses: actions/setup-node@v4
#         with:
#           node-version: 24

#       - name: 📦 Install dependencies
#         run: npm ci

#       - name: 🎭 Install Playwright Browsers
#         run: npx playwright install --with-deps

#       - name: 🚀 Run UI tests on ${{ matrix.browser }}
#         run: npx playwright test src/tests --grep-invert "@api" --project=${{ matrix.browser }}

#       - name: 📦 Package per‑browser reports
#         run: |
#             mkdir -p combined/${{ matrix.browser }}
#             mv playwright-report combined/${{ matrix.browser }}/playwright-report
#             mv json-report combined/${{ matrix.browser }}/json-report

#       - name: 📄 Upload per‑browser reports
#         if: always()
#         uses: actions/upload-artifact@v4
#         with:
#           name: report-${{ matrix.browser }}
#           path: combined/${{ matrix.browser }}/
#           if-no-files-found: warn

  # ============================================================
  # 3️⃣  Merge HTML reports and prepare for publishing
  # ============================================================
  merge-report:
    name: Merge Playwright reports
    runs-on: ubuntu-latest
    needs: api-tests
    if: always()
    outputs:
        report_dir: ${{ steps.setdir.outputs.name }}
    steps:
    - name: 🧾 Checkout repository
      uses: actions/checkout@v4
    - name: 📅 Create unique report directory name
      id: setdir
      run: |
        SHORT_SHA="${GITHUB_SHA::7}"
        DIR_NAME="reports/$(date +'%Y-%m-%d_%H-%M')_${SHORT_SHA}"
        echo "name=${DIR_NAME}" >> $GITHUB_OUTPUT

    - name: ⬇️ Download all reports (API + UI)
      uses: actions/download-artifact@v4
      with:
        pattern: report-*
        merge-multiple: true
        path: merged-results

    - name: 🧮 Show merged-results content
    #   run: find merged-results -type f
      run: realpath merged-results

    - name: 🔧 Merge Playwright reports
      run: npx playwright merge-reports --reporter=html merged-results/blob-report

    - name: 📦 Add timestamped folder
      run: |
        mkdir -p ${{ steps.setdir.outputs.name }}
        mv playwright-report/* ${{ steps.setdir.outputs.name }}
    - name: 📦 Upload Pages artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: reports

  # ============================================================
  # 4️⃣  Deploy merged HTML report to GitHub Pages
  # ============================================================
  deploy:
    name: Deploy HTML Reports (with cleanup)
    runs-on: ubuntu-latest
    needs: merge-report
    if: always()
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
    # Download previously deployed Pages artifact (if any)
    - name: ⬇️ Download previous site content
      uses: actions/download-pages-artifact@v3
      id: previous
      continue-on-error: true
      with:
        path: site
    # Bring in new reports artifact
    - name: ⬇️ Download new reports artifact
      uses: actions/download-artifact@v4
      with:
        name: github-pages
        path: site
    # 🧹 Remove reports older than 7 days locally (no git)
    - name: 🧹 Cleanup old reports before deploy
      run: |
        if [ -d "site/reports" ]; then
          echo "🧹 Removing reports older than 15 days..."
          find site/reports -maxdepth 1 -type d -mtime +15 -not -path "site/reports" -exec rm -rf {} +
        fi
      shell: bash
    # 🚀 Deploy to GitHub Pages
    - name: 🚀 Deploy
      id: deployment
      uses: actions/deploy-pages@v4
      with:
        path: site
  
        id: deployment
        uses: actions/deploy-pages@v4
