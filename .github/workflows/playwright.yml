name: 🎭 Playwright Tests (API + UI)

on:
  # Trigger manually from GitHub UI
  workflow_dispatch:

  # Run weekly on Sunday at 02:00 UTC
  schedule:
    - cron: '0 2 * * 0'

jobs:
  # ============================================================
  # 1️⃣  Run API tests first (single browser)
  # ============================================================
  api-tests:
    name: Run API Tests
    runs-on: ubuntu-latest

    env:
      FORM_AUTH_USER: ${{ secrets.FORM_AUTH_USER }}
      FORM_AUTH_PASS: ${{ secrets.FORM_AUTH_PASS }}
      BASE_URL: ${{ secrets.BASE_URL }}

    steps:
      - name: 🧾 Checkout repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🎭 Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: 🚀 Run API tests (single browser)
        run: npx playwright test src/tests/api --project=chromium

  # ============================================================
  # 2️⃣  Run UI tests after API succeeds (matrix of browsers)
  # ============================================================
  ui-tests:
    name: Run UI Tests
    runs-on: ubuntu-latest
    needs: api-tests     # Wait until API job passes

    strategy:
      matrix:
        browser: [chromium, firefox]
      fail-fast: false

    env:
      FORM_AUTH_USER: ${{ secrets.FORM_AUTH_USER }}
      FORM_AUTH_PASS: ${{ secrets.FORM_AUTH_PASS }}
      BASE_URL: ${{ secrets.BASE_URL }}

    steps:
      - name: 🧾 Checkout repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🎭 Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: 🚀 Run UI tests on ${{ matrix.browser }}
        run: npx playwright test src/tests --grep-invert "@api" --project=${{ matrix.browser }}

      - name: 📄 Upload per‑browser reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: report-${{ matrix.browser }}
          path: playwright-report/

  cleanup-old-reports:
    name: Cleanup old reports (keep 7 days)
    runs-on: ubuntu-latest
    steps:
      - name: 🧾 Checkout repository
        uses: actions/checkout@v4
      - name: 🧹 Remove reports older than 15 days
        run: |
          if [ -d "reports" ]; then
            find reports -maxdepth 1 -type d -mtime +15 -not -path "reports" -exec rm -rf {} +
            echo "Old reports deleted."
          else
            echo "ℹ️ No 'reports' directory found — skipping cleanup."
          fi
      - name: ✅ Commit cleanup (no failure if nothing changed)
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add reports || true
          git commit -m "ci: cleanup old reports" || echo "No old reports to delete."
      - name: 🔄 Push cleanup changes
        run: git push
  
  # ============================================================
  # 3️⃣  Merge HTML reports and prepare for publishing
  # ============================================================
  merge-report:
    name: Merge Playwright reports
    runs-on: ubuntu-latest
    needs: [ui-tests, cleanup-old-reports]
    if: always()
    outputs:
        report_dir: ${{ steps.setdir.outputs.name }}
    steps:
    - name: 🧾 Checkout repository
      uses: actions/checkout@v4
    - name: 📅 Create unique report directory name
      id: setdir
      run: |
        SHORT_SHA="${GITHUB_SHA::7}"
        DIR_NAME="reports/$(date +'%Y-%m-%d_%H-%M')_${SHORT_SHA}"
        echo "name=${DIR_NAME}" >> $GITHUB_OUTPUT
    - name: ⬇️ Download all browser reports
      uses: actions/download-artifact@v4
      with:
        pattern: report-*
        merge-multiple: true
        path: playwright-report
    - name: 🔧 Merge Playwright reports
      run: npx playwright merge-reports --reporter=html playwright-report
    - name: 📦 Add timestamped folder
      run: |
        mkdir -p ${{ steps.setdir.outputs.name }}
        mv playwright-report/* ${{ steps.setdir.outputs.name }}
    - name: 📦 Upload Pages artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: reports

  # ============================================================
  # 4️⃣  Deploy merged HTML report to GitHub Pages
  # ============================================================
  deploy:
    name: Deploy HTML Report to GitHub Pages
    runs-on: ubuntu-latest
    needs: merge-report
    if: always()

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: 🚀 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
